<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Velvet Elves — Attorney Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Lora:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
  <style>
    /* ─── TOKENS ─────────────────────────────────────────────── */
    :root {
      --orange:        #E26812;
      --orange-dark:   #B85107;
      --orange-mid:    #F48C3D;
      --orange-light:  #FFF3E8;
      --orange-border: #F0C49A;
      --orange-soft:   #FFFAF5;
      --navy:          #1B3058;
      --navy-2:        #243F6E;
      --navy-3:        #2E4F85;
      --bg:            #F4F2EF;
      --surface:       #FFFFFF;
      --surface-2:     #FAFAF8;
      --surface-3:     #F6F5F2;
      --line:          #E6E3DC;
      --line-2:        #D6D2C8;
      --text:          #161616;
      --text-2:        #3D3D3A;
      --muted:         #6B6B68;
      --ghost:         #9A9A96;
      --green:         #126544;
      --green-bg:      #EBF7F1;
      --green-border:  #A9D9BF;
      --green-text:    #0E5238;
      --amber:         #9A6005;
      --amber-bg:      #FEF7E7;
      --amber-border:  #E8C47E;
      --amber-text:    #7A4C04;
      --red:           #B83230;
      --red-bg:        #FEF1F1;
      --red-border:    #EAB8B8;
      --red-text:      #922826;
      --blue:          #234A7D;
      --blue-bg:       #EDF3FF;
      --blue-border:   #BACAE8;
      --blue-text:     #1C3D6B;
      --shadow-sm:     0 1px 3px rgba(20,20,20,.06), 0 1px 2px rgba(20,20,20,.04);
      --shadow:        0 4px 16px rgba(20,20,20,.08), 0 1px 4px rgba(20,20,20,.04);
      --shadow-lg:     0 12px 40px rgba(20,20,20,.10), 0 2px 8px rgba(20,20,20,.05);
      --radius-sm:     10px;
      --radius:        16px;
      --radius-lg:     20px;
      --sidebar-w:     256px;
      --topbar-h:      58px;
      --command-h:     48px;
      --rail-w:        340px;
      --font-sans:     'IBM Plex Sans', sans-serif;
      --font-serif:    'Lora', serif;
      --font-mono:     'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; font-size: 14px; line-height: 1.5; }
    button, input, select { font: inherit; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; background: none; }

    /* ─── LAYOUT ─────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      grid-template-rows: 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── SIDEBAR ─────────────────────────────────────────────── */
    .sidebar {
      background: linear-gradient(175deg, var(--navy) 0%, #162644 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      border-right: 1px solid rgba(255,255,255,.07);
    }
    .sidebar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.018'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 16px 16px 14px;
      border-bottom: 1px solid rgba(255,255,255,.07);
      flex-shrink: 0;
    }
    .brand-mark {
      width: 38px; height: 38px;
      border-radius: 11px;
      background: var(--orange);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      box-shadow: 0 2px 8px rgba(226,104,18,.35), inset 0 0 0 1px rgba(255,255,255,.15);
      flex-shrink: 0;
    }
    .brand-copy strong {
      display: block;
      font-family: var(--font-serif);
      font-size: 17px;
      color: #fff;
      line-height: 1;
    }
    .brand-copy span {
      display: block;
      font-family: var(--font-mono);
      font-size: 8.5px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,.5);
      margin-top: 4px;
    }

    /* ─── SIDEBAR STATS ─────────────────────────────────────── */
    .sidebar-stats {
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,.07);
      flex-shrink: 0;
    }
    .stats-label {
      font-family: var(--font-mono);
      font-size: 8.5px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
      margin-bottom: 9px;
    }
    .stats-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-pill {
      flex: 1;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      padding: 8px 8px 7px;
      text-align: center;
    }
    .stat-pill .n {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 600;
      line-height: 1;
    }
    .stat-pill .t {
      font-size: 9px;
      color: rgba(255,255,255,.6);
      margin-top: 3px;
      line-height: 1.3;
    }
    .n.red   { color: #FF8E8A; }
    .n.amber { color: #FFC97A; }
    .n.blue  { color: #9BBEF8; }
    .n.green { color: #7ADBA8; }

    /* ─── MATTER LIST ─────────────────────────────────────────── */
    .matters-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 12px 14px 0;
    }
    .matters-label {
      font-family: var(--font-mono);
      font-size: 8.5px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .matter-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 2px;
      padding-bottom: 12px;
    }
    .matter-list::-webkit-scrollbar { width: 3px; }
    .matter-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 3px; }

    .matter-btn {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 13px;
      padding: 11px 12px;
      text-align: left;
      color: #fff;
      transition: background .15s, border-color .15s;
      position: relative;
    }
    .matter-btn:hover { background: rgba(255,255,255,.08); }
    .matter-btn.active {
      background: rgba(226,104,18,.14);
      border-color: rgba(226,104,18,.28);
    }
    .matter-btn.active::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 60%;
      background: var(--orange);
      border-radius: 0 3px 3px 0;
    }
    .matter-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 5px;
    }
    .matter-name { font-size: 12.5px; font-weight: 600; line-height: 1.2; }
    .mbadge {
      font-family: var(--font-mono);
      font-size: 8.5px;
      letter-spacing: .3px;
      padding: 2.5px 7px;
      border-radius: 999px;
      border: 1px solid;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .mbadge.critical { background: rgba(190,50,48,.2); border-color: rgba(234,184,184,.2); color: #FF9A97; }
    .mbadge.attention { background: rgba(154,96,5,.2); border-color: rgba(232,196,126,.2); color: #FFCA7A; }
    .mbadge.clean { background: rgba(18,101,68,.2); border-color: rgba(169,217,191,.2); color: #7ADBA8; }
    .matter-meta { font-size: 11px; color: rgba(255,255,255,.62); line-height: 1.45; }

    /* ─── SIDEBAR FOOTER ─────────────────────────────────────── */
    .sidebar-footer {
      padding: 12px 14px;
      border-top: 1px solid rgba(255,255,255,.07);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .sf-btn {
      flex: 1;
      padding: 10px 12px;
      border-radius: 11px;
      font-size: 12.5px;
      font-weight: 600;
      transition: .15s;
      border: none;
    }
    .sf-btn.primary { background: var(--orange); color: #fff; }
    .sf-btn.primary:hover { background: var(--orange-dark); }
    .sf-btn.secondary { background: rgba(255,255,255,.08); color: rgba(255,255,255,.85); border: 1px solid rgba(255,255,255,.1); }
    .sf-btn.secondary:hover { background: rgba(255,255,255,.13); }

    /* ─── MAIN COLUMN ─────────────────────────────────────────── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ─── TOPBAR ─────────────────────────────────────────────── */
    .topbar {
      height: var(--topbar-h);
      background: rgba(244,242,239,.95);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      flex-shrink: 0;
      z-index: 10;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .crumb-path {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--ghost);
    }
    .crumb-sep { color: var(--line-2); margin: 0 6px; }
    .tb-matter-name {
      font-family: var(--font-serif);
      font-size: 17px;
      line-height: 1;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tb-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: .4px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .tb-status-badge.critical { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); }
    .tb-status-badge.attention { background: var(--amber-bg); border-color: var(--amber-border); color: var(--amber-text); }
    .tb-status-badge.clean { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    .topbar-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .tb-btn {
      padding: 8px 14px;
      border-radius: 9px;
      font-size: 12.5px;
      font-weight: 600;
      transition: .15s;
      border: none;
    }
    .tb-btn.primary { background: var(--orange); color: #fff; }
    .tb-btn.primary:hover { background: var(--orange-dark); }
    .tb-btn.ghost { background: transparent; color: var(--text-2); border: 1px solid var(--line-2); }
    .tb-btn.ghost:hover { background: var(--surface); border-color: var(--orange-border); color: var(--orange-dark); }
    .tb-icon-btn {
      width: 34px; height: 34px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      color: var(--muted);
      border: 1px solid var(--line);
      background: var(--surface);
      transition: .15s;
    }
    .tb-icon-btn:hover { border-color: var(--orange-border); color: var(--orange); background: var(--orange-light); }

    /* ─── COMMAND STRIP ─────────────────────────────────────── */
    .command-strip {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: var(--command-h);
      border-bottom: 1px solid var(--line);
      transition: background .25s, border-color .25s;
      z-index: 9;
    }
    .command-strip.is-critical {
      background: linear-gradient(90deg, #FEF1F0 0%, var(--surface) 60%);
      border-bottom-color: var(--red-border);
    }
    .command-strip.is-attention {
      background: linear-gradient(90deg, #FEFAEE 0%, var(--surface) 60%);
      border-bottom-color: var(--amber-border);
    }
    .command-strip.is-clean {
      background: linear-gradient(90deg, #F0FBF5 0%, var(--surface) 60%);
      border-bottom-color: var(--green-border);
    }
    .command-icon {
      font-size: 15px;
      flex-shrink: 0;
    }
    .command-text {
      flex: 1;
      font-size: 13px;
      color: var(--text-2);
      min-width: 0;
    }
    .command-text strong { font-weight: 600; }
    .command-text .ct-muted { color: var(--muted); font-size: 12px; }
    .command-cta {
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      transition: .15s;
      flex-shrink: 0;
    }
    .command-cta.red { background: var(--red-bg); color: var(--red-text); border: 1px solid var(--red-border); }
    .command-cta.red:hover { background: #FADDDD; }
    .command-cta.amber { background: var(--amber-bg); color: var(--amber-text); border: 1px solid var(--amber-border); }
    .command-cta.amber:hover { background: #FEF2D0; }
    .command-cta.green { background: var(--green-bg); color: var(--green-text); border: 1px solid var(--green-border); }
    .command-cta.green:hover { background: #DAEEF3; }
    .command-strip-clean-msg {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: var(--green);
    }

    /* ─── WORKSPACE ─────────────────────────────────────────── */
    .workspace {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--rail-w);
      gap: 16px;
      padding: 16px 20px 24px;
      align-items: start;
    }
    .workspace::-webkit-scrollbar { width: 6px; }
    .workspace::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 6px; }

    .col { display: flex; flex-direction: column; gap: 14px; }

    /* ─── PANEL BASE ─────────────────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
    }
    .panel.soft { background: var(--surface-2); box-shadow: none; }

    /* ─── SUMMARY CARDS ─────────────────────────────────────── */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 16px 18px;
    }
    .sum-card {
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 13px 13px 12px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    .sum-card:hover { border-color: var(--orange-border); box-shadow: var(--shadow-sm); }
    .sum-card .sv {
      font-family: var(--font-mono);
      font-size: 26px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 5px;
    }
    .sv.red   { color: var(--red); }
    .sv.amber { color: var(--amber); }
    .sv.blue  { color: var(--blue); }
    .sv.green { color: var(--green); }
    .sum-card .sl { font-size: 11.5px; font-weight: 600; line-height: 1.3; color: var(--text-2); }
    .sum-card .sn { font-size: 11px; color: var(--muted); line-height: 1.4; margin-top: 4px; }

    /* ─── SECTION HEADER ─────────────────────────────────────── */
    .sec-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 0;
    }
    .sec-eyebrow {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ghost);
      margin-bottom: 4px;
    }
    .sec-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .sec-action {
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--muted);
      border: 1px solid var(--line);
      background: transparent;
      transition: .15s;
    }
    .sec-action:hover { border-color: var(--orange-border); color: var(--orange-dark); background: var(--orange-light); }

    /* ─── DOC ROWS ─────────────────────────────────────────────── */
    .doc-list { display: flex; flex-direction: column; gap: 8px; padding: 12px 18px 16px; }

    .doc-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto auto auto;
      gap: 14px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 13px;
      padding: 13px 14px;
      background: var(--surface-2);
      transition: border-color .15s;
    }
    .doc-row.is-critical {
      border-color: var(--red-border);
      background: #FFFBFB;
    }
    .doc-row.is-attention {
      border-color: var(--amber-border);
      background: #FFFDF7;
    }
    .doc-row:hover { border-color: var(--line-2); }
    .doc-row.is-critical:hover { border-color: #D8A0A0; }
    .doc-row.is-attention:hover { border-color: #D8BA80; }

    .doc-name strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
    }
    .doc-name span {
      display: block;
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.4;
    }
    .doc-col {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      min-width: 0;
    }
    .doc-col-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ghost);
      margin-bottom: 4px;
      white-space: nowrap;
    }
    .doc-col-val {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.35;
    }
    .doc-col-val.muted { color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid;
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: .3px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .pill.green { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
    .pill.amber { background: var(--amber-bg); border-color: var(--amber-border); color: var(--amber-text); }
    .pill.red   { background: var(--red-bg);   border-color: var(--red-border);   color: var(--red-text); }
    .pill.blue  { background: var(--blue-bg);  border-color: var(--blue-border);  color: var(--blue-text); }

    /* Priority-aware action buttons */
    .doc-action {
      padding: 8px 14px;
      border-radius: 9px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      transition: .15s;
    }
    .doc-action.primary-red { background: var(--red); color: #fff; }
    .doc-action.primary-red:hover { background: #922826; }
    .doc-action.primary-amber { background: var(--orange); color: #fff; }
    .doc-action.primary-amber:hover { background: var(--orange-dark); }
    .doc-action.secondary { background: var(--surface); color: var(--text-2); border: 1px solid var(--line-2); }
    .doc-action.secondary:hover { border-color: var(--orange-border); color: var(--orange-dark); background: var(--orange-light); }

    /* ─── TIMELINE ───────────────────────────────────────────── */
    .timeline-list { display: flex; flex-direction: column; padding: 10px 18px 16px; gap: 0; }
    .tl-item {
      display: grid;
      grid-template-columns: 78px 1fr auto;
      gap: 12px;
      align-items: flex-start;
      padding: 11px 0;
      border-top: 1px solid var(--line);
      transition: background .1s;
    }
    .tl-item:first-child { border-top: none; }
    .tl-date { font-family: var(--font-mono); font-size: 10.5px; color: var(--ghost); padding-top: 2px; }
    .tl-body strong { display: block; font-size: 12.5px; font-weight: 600; }
    .tl-body span { display: block; font-size: 11.5px; color: var(--muted); line-height: 1.45; margin-top: 3px; }
    .tl-pill { font-size: 9px; padding: 3px 8px; }

    /* ─── CHANGES ─────────────────────────────────────────────── */
    .changes-list { display: flex; flex-direction: column; gap: 8px; padding: 10px 18px 16px; }
    .change-item {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-2);
    }
    .change-item strong { display: block; font-size: 12.5px; font-weight: 600; }

      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ghost);
      margin-bottom: 11px;

      border-radius: 14px;
      background: linear-gradient(135deg, var(--orange-soft), #fff 70%);

    }

      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
    }
    .brief-main-title {
      font-size: 14px;
      font-family: var(--font-serif);
      line-height: 1.3;
      color: var(--text);
      flex: 1;
    }

      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      background: rgba(226,104,18,.12);
      color: var(--orange);
      font-size: 11px;
      flex-shrink: 0;
      transition: transform .2s;
    }

    .brief-body { padding: 0 14px 14px; display: none; border-top: 1px solid rgba(226,104,18,.15); }

    .brief-copy { font-size: 12.5px; color: var(--muted); line-height: 1.55; padding-top: 11px; }

      font-size: 10px;

      letter-spacing: .7px;
      color: var(--orange-dark);
      margin-bottom: 3px;

    .brief-item span { font-size: 12px; color: var(--muted); line-height: 1.5; }

      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: var(--surface);

    .queue-item span { display: block; font-size: 11.5px; color: var(--muted); line-height: 1.4; margin-top: 3px; }

    .contact-card {
      border: 1px solid var(--line);

      margin: 14px 18px 16px;

function copyToClipboard(text) {
  // FIX: fallback for non-HTTPS / older browsers + visual feedback
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).catch(fallback);
  } else {
    fallback();
  }
  // Visual feedback: briefly flash the clicked button
  const btn = event && event.currentTarget;
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = 'Copied ✓';
    btn.style.background = 'var(--green-bg)';
    btn.style.borderColor = 'var(--green-border)';
    btn.style.color = 'var(--green-text)';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.background = '';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 1500);
  }
}

function renderMatter(id) {
  const m = matters[id];

  /* topbar */
  document.getElementById('tbMatterName').textContent = m.titleFull;
  const badge = document.getElementById('tbStatusBadge');
  badge.className = 'tb-status-badge ' + m.status;
  document.getElementById('tbStatusText').textContent = m.statusLabel;

  /* command strip */
  const strip = document.getElementById('commandStrip');
  strip.className = 'command-strip is-' + m.status;
  if (m.status === 'clean') {
    // FIX: derive next checkpoint from matter timeline instead of hardcoding 'Thursday'
    const nextCheckpoint = m.timeline && m.timeline.length > 0 ? m.timeline[0].date : 'Soon';
    strip.innerHTML = `
      <span class="command-icon">✅</span>
      <span class="command-strip-clean-msg">No attorney action required · Next checkpoint: ${nextCheckpoint}</span>
    `;
  } else {
    strip.innerHTML = `
      <span class="command-icon">${m.command.icon}</span>
      <div class="command-text">${m.command.text}</div>
      <button class="command-cta ${m.command.ctaClass}">${m.command.ctaLabel}</button>
    `;
  }

  /* ── MAIN COLUMN ── */
  const mainCol = document.getElementById('mainCol');
  mainCol.innerHTML = '';

  /* summary cards */
  const summaryPanel = document.createElement('div');
  summaryPanel.className = 'panel matter-panel-content';
  summaryPanel.innerHTML = `
    <div class="summary-row">
      ${m.summary.map(s => `
        <div class="sum-card" title="${s.note}">
          <div class="sv ${s.cls}">${s.val}</div>
          <div class="sl">${s.label}</div>
          <div class="sn">${s.note}</div>
        </div>
      `).join('')}
    </div>
  `;
  mainCol.appendChild(summaryPanel);

  /* clean matter special state */
  if (m.status === 'clean') {
    const cleanPanel = document.createElement('div');
    cleanPanel.className = 'panel matter-panel-content';
    cleanPanel.innerHTML = `
      <div class="clean-banner">
        <div class="clean-icon">🟢</div>
        <div class="clean-text">
          <strong>This file is clean — no blocking items</strong>
          <span>AI has assembled the package and found no active legal blockers. The only remaining task is a routine schedule check on Thursday.</span>
        </div>
        <button class="clean-expand-btn" id="cleanExpandBtn">View full file</button>
      </div>
    `;
    mainCol.appendChild(cleanPanel);

    const hiddenContent = document.createElement('div');
    hiddenContent.id = 'cleanHidden';
    hiddenContent.style.display = 'none';
    mainCol.appendChild(hiddenContent);

    // FIX: guard against re-rendering on repeated expand clicks
    let cleanRendered = false;
    document.getElementById('cleanExpandBtn').addEventListener('click', function() {
      const h = document.getElementById('cleanHidden');
      if (h.style.display === 'none') {
        if (!cleanRendered) {
          renderDocSection(h, m);
          renderTimelineSection(h, m);
          renderChangesSection(h, m);
          cleanRendered = true;
        }
        h.style.display = '';
        this.textContent = 'Collapse';
      } else {
        h.style.display = 'none';
        this.textContent = 'View full file';
      }
    });
  } else {
    renderDocSection(mainCol, m);
    renderTimelineSection(mainCol, m);
    renderChangesSection(mainCol, m);
  }

  /* ── RAIL COLUMN ── */
  const railCol = document.getElementById('railCol');
  railCol.innerHTML = '';
  renderRail(railCol, m);
}
